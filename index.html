<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WNBA Live Scores — Score Sheet</title>
<style>
  :root{
    --grid-line:#d0d3d8;
    --header-bg:#eef1f4;
    --header-fg:#3c4043;
    --cell-bg:#ffffff;
    --yellow:#fff3b0;
    --pink:#f8c9c9;
    --green:#c8e9d1;
    --accent:#1a5cff;
    --live-dot:#e0473a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:24px;
    background:#f4f5f7;
    font-family:"Segoe UI", Calibri, Arial, sans-serif;
    color:#202124;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:14px;
  }
  h1{
    font-size:19px;
    font-weight:600;
    margin:0;
    letter-spacing:.2px;
  }
  .status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#5f6368;
    background:#fff;
    border:1px solid var(--grid-line);
    border-radius:20px;
    padding:6px 12px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#9aa0a6;
  }
  .dot.live{
    background:var(--live-dot);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(224,71,58,.5);}
    70%{box-shadow:0 0 0 6px rgba(224,71,58,0);}
    100%{box-shadow:0 0 0 0 rgba(224,71,58,0);}
  }
  .banner{
    font-size:12.5px;
    color:#8a5300;
    background:#fff7e0;
    border:1px solid #f0dca0;
    border-radius:6px;
    padding:8px 12px;
    margin-bottom:14px;
    display:none;
  }
  .sheet-scroll{
    overflow-x:auto;
    border:1px solid var(--grid-line);
    border-radius:6px;
    background:#fff;
  }
  table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
    font-size:11.5px;
  }
  th,td{
    border:1px solid var(--grid-line);
    padding:4px 3px;
    text-align:center;
    white-space:normal;
    word-break:break-word;
    overflow-wrap:break-word;
  }
  .colhead th{
    background:var(--header-bg);
    color:#5f6368;
    font-weight:500;
    font-size:10px;
    height:18px;
    padding:2px;
  }
  .corner{background:var(--header-bg);}
  .rownum{
    background:var(--header-bg);
    color:#5f6368;
    font-weight:500;
    width:20px;
  }
  .hdr-row th{
    background:#f7f8fa;
    font-weight:600;
    color:#3c4043;
    font-size:10.5px;
  }
  td.team{
    text-align:center;
    font-weight:600;
    background:#fafbfc;
    font-size:10px;
    line-height:1.2;
  }
  td.label{
    text-align:center;
    font-size:10px;
    color:#5f6368;
    font-style:italic;
    background:#fafbfc;
  }
  td.fit-line{
    white-space:nowrap !important;
    overflow:hidden;
    text-overflow:ellipsis;
    font-size:9px;
    padding-left:1px;
    padding-right:1px;
  }
  td.formula{font-weight:600;}
  td.avg{background:var(--yellow);}
  td.pred-total{background:var(--pink);font-weight:700;}
  td.grand-total{background:var(--green);font-weight:700;}
  td.blank{background:#fbfbfc;}
  .light-yellow{color:#d4b700 !important;}
  select.light-yellow{color:#d4b700;}
  td.matchup-label{
    text-align:center;
    font-weight:600;
    font-size:11px;
    background:#f0f3ff;
    color:#26324a;
  }
  tr.spacer-row td{
    background:#f4f5f7;
    border-left:none;
    border-right:none;
    height:10px;
    padding:2px;
  }
  input[type=number]{
    width:100%;
    max-width:38px;
    border:1px solid #c7cad0;
    border-radius:3px;
    text-align:center !important;
    font-size:11px;
    padding:2px 1px;
    font-family:inherit;
    -moz-appearance:textfield;
    -webkit-appearance:none;
    appearance:none;
    margin:0 auto;
    display:block;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  input[type=number]:disabled{
    border:none;
    background:transparent;
    color:#202124;
    font-weight:600;
    text-align:center !important;
    opacity:1;
    -webkit-text-fill-color:#202124;
  }
  select{
    border:1px solid #c7cad0;
    border-radius:3px;
    font-size:10.5px;
    padding:2px;
    font-family:inherit;
    width:100%;
    max-width:52px;
    margin:0 auto;
    display:block;
    text-align:center !important;
    text-align-last:center;
  }
  input.k5{
    max-width:48px;
  }
  .footer{
    margin-top:12px;
    font-size:11.5px;
    color:#9aa0a6;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:6px;
  }
  button.refresh{
    border:1px solid var(--grid-line);
    background:#fff;
    border-radius:6px;
    padding:6px 12px;
    font-size:12.5px;
    cursor:pointer;
    color:#3c4043;
  }
  button.refresh:hover{background:#f1f3f4;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <h1>WNBA Live Scores — Score Sheet</h1>
    <div class="status" id="statusPill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="sheet-scroll">
    <table>
      <colgroup id="mainColgroup">
        <col style="width:2.5%">  <!-- rownum -->
        <col style="width:9%">   <!-- Team -->
        <col style="width:5%">   <!-- Q1 -->
        <col style="width:5%">   <!-- Q2 -->
        <col style="width:5%">   <!-- Q3 -->
        <col style="width:8%">   <!-- Avg Q1-3 -->
        <col style="width:6%">   <!-- Q4=5 min -->
        <col style="width:7%">   <!-- T=35 min -->
        <col style="width:5%">   <!-- Q4 -->
        <col style="width:6%">   <!-- Total -->
        <col style="width:6%">   <!-- O/U -->
        <col style="width:15%">  <!-- Odds -->
        <col style="width:10%">  <!-- Diff. -->
        <col style="width:10.5%"><!-- Suggested Pick -->
      </colgroup>
      <tr class="colhead" id="colheadRow">
        <th class="corner"></th>
        <th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th>
        <th>G</th><th>H</th><th>I</th><th>J</th><th>K</th><th>L</th><th>M</th>
      </tr>
      <tr class="hdr-row" id="hdrRow">
        <td class="rownum">1</td>
        <td>Team</td><td>Q1</td><td>Q2</td><td>Q3</td><td>Avg Q1-3</td>
        <td>Q4=5 min</td><td>T=35 min</td><td>Q4</td><td>Total</td>
        <td>O/U</td><td>Odds</td><td>Diff.</td><td>Suggested Pick</td>
      </tr>
      <tbody id="gamesBody"></tbody>
    </table>
  </div>

  <div class="footer">
    <span id="clockInfo">Auto-refreshing every 5s</span>
    <span>
      <button class="refresh" id="refreshBtn">Refresh now</button>
      &nbsp;Last updated: <span id="lastUpdated">—</span>
    </span>
  </div>
  <div id="debugLog" style="margin-top:6px;font-size:10.5px;color:#9aa0a6;word-break:break-all;"></div>

</div>

<script>
const $ = id => document.getElementById(id);
const eg = (gid, suffix) => document.getElementById(`${gid}-${suffix}`);

let liveMode = false;
let failCount = 0;
let gameState = {};       // gid -> { q4Snapshot: {away, home} }
let rowCounter = { n: 2 }; // continues across every game block, spreadsheet-style
let extraOTCount = 0;      // number of overtime columns currently rendered (Q5, Q6, ...)

function rebuildTableHeader(){
  let colHtml = `
    <col style="width:2.5%">
    <col style="width:9%">
    <col style="width:5%">
    <col style="width:5%">
    <col style="width:5%">
    <col style="width:8%">
    <col style="width:6%">
    <col style="width:7%">
    <col style="width:5%">
  `;
  for(let n=1;n<=extraOTCount;n++){ colHtml += `<col style="width:5%">`; }
  colHtml += `
    <col style="width:6%">
    <col style="width:15%">
    <col style="width:10%">
    <col style="width:10.5%">
  `;
  $("mainColgroup").innerHTML = colHtml;

  const totalDataCols = 13 + extraOTCount; // A..M plus any OT columns inserted after H
  let colheadHtml = `<th class="corner"></th>`;
  for(let i=0;i<totalDataCols;i++){
    colheadHtml += `<th>${String.fromCharCode(65+i)}</th>`;
  }
  $("colheadRow").innerHTML = colheadHtml;

  let hdrHtml = `
    <td class="rownum">1</td>
    <td>Team</td><td>Q1</td><td>Q2</td><td>Q3</td><td>Avg Q1-3</td>
    <td>Q4=5 min</td><td>T=35 min</td><td>Q4</td>
  `;
  for(let n=1;n<=extraOTCount;n++){ hdrHtml += `<td>Q${4+n}</td>`; }
  hdrHtml += `
    <td>Total</td><td>O/U</td><td>Odds</td><td>Diff.</td><td>Suggested Pick</td>
  `;
  $("hdrRow").innerHTML = hdrHtml;
}

// Rebuilds the whole sheet with the wider column set needed for overtime.
// Safe to do because K5/J5/J3 persist via localStorage and get restored by
// ensureGameBlock, and F/Q4 snapshots re-derive themselves from live/backfill
// data on the next applyGameData call for each game.
function rebuildForOT(newCount){
  extraOTCount = newCount;
  gameState = {};
  rowCounter = { n: 2 };
  rebuildTableHeader();
  $("gamesBody").innerHTML = "";
}

function neededOTCount(parsedList){
  let maxPeriod = 4;
  for(const g of parsedList){
    if(g.status.period > maxPeriod) maxPeriod = g.status.period;
  }
  return Math.max(0, maxPeriod - 4);
}

function periodScore(team, period){
  const entry = (team.linescores || []).find(l => l.period === period);
  return entry ? num(entry.value) : null;
}

function setGlobalStatus(text, live){
  $("statusText").textContent = text;
  $("statusDot").classList.toggle("live", !!live);
}

function showBanner(msg){
  const b = $("banner");
  if(!msg){ b.style.display = "none"; return; }
  b.style.display = "block";
  b.textContent = msg;
}

function num(v){ const n = Number(v); return isNaN(n) ? 0 : n; }
function round0(n){ return Math.round(n); }

function saveField(gid, suffix, value){
  try{ localStorage.setItem(`wnba_${suffix}_${gid}`, value); }catch(e){ /* storage unavailable — ignore */ }
}
function loadField(gid, suffix){
  try{ return localStorage.getItem(`wnba_${suffix}_${gid}`); }catch(e){ return null; }
}
function round0AvgB4D4(B4, C4, D4){
  const avg = (B4 + C4 + D4) / 3;
  return Math.round(avg * 10) / 10;
}
function mround(value, multiple){
  if(!multiple) return value;
  return Math.round(value/multiple)*multiple;
}
function fmt(n, decimals){
  if(n === null || n === undefined || isNaN(n)) return "–";
  return decimals ? Number(n).toFixed(decimals) : String(round0(n));
}

function parseClockRemaining(clockStr){
  if(!clockStr) return null;
  const parts = clockStr.split(":");
  if(parts.length !== 2) return null;
  const m = parseFloat(parts[0]);
  const s = parseFloat(parts[1]);
  if(isNaN(m) || isNaN(s)) return null;
  return m + s/60;
}

function makeGameRowsHtml(gid){
  const r2 = rowCounter.n++;
  const r3 = rowCounter.n++;
  const r4 = rowCounter.n++;
  const r5 = rowCounter.n++;

  let otCellsRow2 = "", otCellsRow3 = "", otCellsRow4 = "";
  for(let n=1;n<=extraOTCount;n++){
    otCellsRow2 += `<td class="formula" id="${gid}-OT${n}_2">–</td>`;
    otCellsRow3 += `<td class="formula" id="${gid}-OT${n}_3">–</td>`;
    otCellsRow4 += `<td class="formula" id="${gid}-OT${n}_4">–</td>`;
  }

  return `
    <tr>
      <td class="rownum"></td>
      <td colspan="${13 + extraOTCount}" class="matchup-label" id="${gid}-matchup">—</td>
    </tr>
    <tr>
      <td class="rownum">${r2}</td>
      <td class="team" id="${gid}-awayName">—</td>
      <td><input type="number" id="${gid}-B2" disabled></td>
      <td><input type="number" id="${gid}-C2" disabled></td>
      <td><input type="number" id="${gid}-D2" disabled></td>
      <td class="formula avg" id="${gid}-E2">–</td>
      <td><input type="number" id="${gid}-F2" disabled></td>
      <td class="formula" id="${gid}-G2">–</td>
      <td><input type="number" id="${gid}-H2" disabled></td>
      ${otCellsRow2}
      <td class="formula" id="${gid}-I2">–</td>
      <td class="label light-yellow" id="${gid}-J2">Time left</td>
      <td class="label fit-line">(Tot Q1-3)+AVG</td>
      <td class="label fit-line">Needed to score in Q4</td>
      <td class="blank"></td>
    </tr>
    <tr>
      <td class="rownum">${r3}</td>
      <td class="team" id="${gid}-homeName">—</td>
      <td><input type="number" id="${gid}-B3" disabled></td>
      <td><input type="number" id="${gid}-C3" disabled></td>
      <td><input type="number" id="${gid}-D3" disabled></td>
      <td class="formula avg" id="${gid}-E3">–</td>
      <td><input type="number" id="${gid}-F3" disabled></td>
      <td class="formula" id="${gid}-G3">–</td>
      <td><input type="number" id="${gid}-H3" disabled></td>
      ${otCellsRow3}
      <td class="formula" id="${gid}-I3">–</td>
      <td>
        <select id="${gid}-J3" class="light-yellow">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </td>
      <td class="formula fit-line" id="${gid}-K3">–</td>
      <td class="formula" id="${gid}-L3">–</td>
      <td class="formula" id="${gid}-M3">–</td>
    </tr>
    <tr>
      <td class="rownum">${r4}</td>
      <td class="team">Total</td>
      <td class="formula" id="${gid}-B4">–</td>
      <td class="formula" id="${gid}-C4">–</td>
      <td class="formula" id="${gid}-D4">–</td>
      <td class="formula avg" id="${gid}-E4">–</td>
      <td class="formula" id="${gid}-F4">–</td>
      <td class="formula" id="${gid}-G4">–</td>
      <td class="formula" id="${gid}-H4">–</td>
      ${otCellsRow4}
      <td class="blank"></td><td class="blank"></td>
      <td class="formula" id="${gid}-K4">–</td>
      <td class="formula light-yellow" id="${gid}-L4">–</td>
      <td class="blank"></td>
    </tr>
    <tr>
      <td class="rownum">${r5}</td>
      <td class="team">Predicted</td>
      <td class="formula" id="${gid}-B5">–</td>
      <td class="formula" id="${gid}-C5">–</td>
      <td class="formula" id="${gid}-D5">–</td>
      <td class="formula avg" id="${gid}-E5">–</td>
      <td class="formula" id="${gid}-F5">–</td>
      <td class="formula pred-total" id="${gid}-G5">–</td>
      <td class="blank"></td>
      ${extraOTCount > 0 ? `<td class="blank" colspan="${extraOTCount}"></td>` : ""}
      <td class="formula grand-total" id="${gid}-I5">–</td>
      <td>
        <select id="${gid}-J5">
          <option value="">–</option>
          <option value="Under">Under</option>
          <option value="Over">Over</option>
        </select>
      </td>
      <td><input type="number" step="0.1" class="k5" id="${gid}-K5" placeholder="0.0"></td>
      <td class="formula" id="${gid}-L5">–</td>
      <td class="formula" id="${gid}-M5">–</td>
    </tr>
    <tr class="spacer-row"><td colspan="${14 + extraOTCount}"></td></tr>
  `;
}

function ensureGameBlock(gid){
  if(gameState[gid]) return;
  gameState[gid] = { q4Snapshot: { away: null, home: null }, backfillAttempted: false };
  $("gamesBody").insertAdjacentHTML("beforeend", makeGameRowsHtml(gid));
  ["B2","C2","D2","F2","H2","B3","C3","D3","F3","H3","K5"].forEach(suffix=>{
    eg(gid, suffix).addEventListener("input", ()=>recalcGame(gid));
  });
  eg(gid, "J5").addEventListener("change", ()=>recalcGame(gid));
  eg(gid, "J3").addEventListener("change", ()=>recalcGame(gid));

  // Persist the user's own entries (K5 odds, J5 pick, J3 minutes) so they
  // stick across page reloads/refreshes on this browser until changed again.
  ["K5","J5","J3"].forEach(suffix=>{
    const elx = eg(gid, suffix);
    const saved = loadField(gid, suffix);
    if(saved !== null) elx.value = saved;
    const evt = elx.tagName === "SELECT" ? "change" : "input";
    elx.addEventListener(evt, ()=> saveField(gid, suffix, elx.value));
  });
}

function enableManualFallbackBlock(){
  if(gameState["manual"]) return;
  ensureGameBlock("manual");
  ["B2","C2","D2","F2","H2","B3","C3","D3","F3","H3"].forEach(suffix=>{
    const elx = eg("manual", suffix);
    elx.disabled = false;
    if(elx.value === "") elx.value = 0;
  });
  eg("manual","awayName").textContent = "Away Team";
  eg("manual","homeName").textContent = "Home Team";
  eg("manual","matchup").textContent = "Manual entry — live lookup unavailable";
  recalcGame("manual");
}

function recalcGame(gid){
  const st = gameState[gid] || {};
  const otAway = st.otSumAway || 0;
  const otHome = st.otSumHome || 0;

  const B2=num(eg(gid,"B2").value), C2=num(eg(gid,"C2").value), D2=num(eg(gid,"D2").value);
  const F2=num(eg(gid,"F2").value), H2=num(eg(gid,"H2").value);
  const B3=num(eg(gid,"B3").value), C3=num(eg(gid,"C3").value), D3=num(eg(gid,"D3").value);
  const F3=num(eg(gid,"F3").value), H3=num(eg(gid,"H3").value);

  // Row 2 (Away)
  const E2 = D2===0 ? (B2+C2)/2 : (B2+C2+D2)/3;
  const G2 = B2+C2+D2+F2;
  const I2 = B2+C2+D2+H2+otAway;
  eg(gid,"E2").textContent = fmt(E2);
  eg(gid,"G2").textContent = fmt(G2);
  eg(gid,"I2").textContent = fmt(I2);

  // Row 3 (Home) — E3 formula references row2 cells per spec
  const E3 = D2===0 ? (B2+C2)/2 : (B2+C2+D2)/3;
  const G3 = B3+C3+D3+F3;
  const I3 = B3+C3+D3+H3+otHome;
  eg(gid,"E3").textContent = fmt(E3);
  eg(gid,"G3").textContent = fmt(G3);
  eg(gid,"I3").textContent = fmt(I3);

  // Row 4 (Total)
  const B4=B2+B3, C4=C2+C3, D4=D2+D3, F4=F2+F3, H4=H2+H3;
  const E4 = D4===0 ? (B4+C4)/2 : (B4+C4+D4)/3;
  const G4 = G2+G3;
  eg(gid,"B4").textContent = fmt(B4);
  eg(gid,"C4").textContent = fmt(C4);
  eg(gid,"D4").textContent = fmt(D4);
  eg(gid,"E4").textContent = fmt(E4);
  eg(gid,"F4").textContent = fmt(F4);
  eg(gid,"G4").textContent = fmt(G4);
  eg(gid,"H4").textContent = fmt(H4);

  // K3/L3 reference the Total row
  const sumQ13 = B4+C4+D4;
  const avgQ13 = D4===0 ? (B4+C4)/2 : (B4+C4+D4)/3;
  const avgRounded = round0(avgQ13);
  const combined = round0(sumQ13 + avgRounded);
  eg(gid,"K3").textContent = `${round0(sumQ13)} (Avg: ${avgRounded}) = ${combined}`;

  // L4 = MROUND((G2+G3)*(40/(40-J3)), 0.5)
  const J3 = Number(eg(gid,"J3").value) || 5;
  const timeLeftDenom = 40 - J3;
  const L4 = timeLeftDenom !== 0 ? mround((G2+G3)*(40/timeLeftDenom), 0.5) : NaN;
  eg(gid,"L4").textContent = fmt(L4, 1);

  // Row 5 (Predicted) — Q4 window is 5 min, full-game basis is 40 min
  const B5 = (B4/10)*40;
  const C5 = (C4/10)*40;
  const D5 = (D4/10)*40;
  const E5 = (B5+C5+D5)/3;
  const F5 = (F4/5)*40;
  const validQtrs = [B5,C5,D5].filter(v => !isNaN(v)).length;
  const G5 = (B5+C5+D5 + ((F4*2)/10)*40) / (validQtrs + 1);
  const I5 = I2+I3;

  eg(gid,"B5").textContent = fmt(B5);
  eg(gid,"C5").textContent = fmt(C5);
  eg(gid,"D5").textContent = fmt(D5);
  eg(gid,"E5").textContent = fmt(E5);
  eg(gid,"F5").textContent = fmt(F5);
  eg(gid,"G5").textContent = fmt(G5);
  eg(gid,"I5").textContent = fmt(I5);

  // M3
  const avgB4D4 = round0AvgB4D4(B4, C4, D4);
  let M3;
  if(F4 === 0){
    M3 = "";
  } else if(F4 >= 23){
    M3 = (avgB4D4 > (F4*2)) ? "Below Avg" : "Above Avg";
  } else {
    M3 = (avgB4D4 > (F4*2)) ? "Below Avg" : "Above Avg";
  }
  eg(gid,"M3").textContent = M3 === "" ? "–" : M3;

  const K5 = eg(gid,"K5").value === "" ? null : Number(eg(gid,"K5").value);
  const L3 = K5 === null ? "–" : fmt(Math.abs(sumQ13 - K5), 1);
  eg(gid,"L3").textContent = L3;

  const L5 = K5 === null ? "–" : fmt(Math.abs(K5 - I5), 1);
  eg(gid,"L5").textContent = L5;

  // M5
  const f2Blank = eg(gid,"F2").value === "";
  const f3Blank = eg(gid,"F3").value === "";
  let M5;
  if(f2Blank || f3Blank){
    M5 = "";
  } else if(M3 === "Above Avg"){
    M5 = "Under";
  } else if(M3 === "Below Avg"){
    M5 = "Over";
  } else if(F4 <= 15){
    M5 = "Over";
  } else if(K5 !== null && K5 > G5){
    M5 = "Over";
  } else {
    M5 = "Under";
  }
  eg(gid,"M5").textContent = M5 === "" ? "–" : M5;

  // K4 background: green (same as I5) when the J5/K5 pick is currently
  // winning against the live total (I5); pink (same as G5) otherwise.
  const J5val = eg(gid,"J5").value;
  const pickWinning =
    (J5val === "Over" && K5 !== null && K5 < I5) ||
    (J5val === "Under" && K5 !== null && K5 > I5);
  const k4El = eg(gid,"K4");
  k4El.classList.remove("grand-total", "pred-total");
  k4El.classList.add(pickWinning ? "grand-total" : "pred-total");
}

function applyGameData(gid, away, home, status){
  ensureGameBlock(gid);
  const st = gameState[gid];

  eg(gid,"awayName").textContent = away.name;
  eg(gid,"homeName").textContent = home.name;

  eg(gid,"B2").value = away.q1; eg(gid,"C2").value = away.q2; eg(gid,"D2").value = away.q3;
  eg(gid,"B3").value = home.q1; eg(gid,"C3").value = home.q2; eg(gid,"D3").value = home.q3;

  const period = status.period;
  const state = status.state; // 'pre' | 'in' | 'post'

  const awayQ4Live = period >= 4 ? away.q4 : 0;
  const homeQ4Live = period >= 4 ? home.q4 : 0;
  eg(gid,"H2").value = awayQ4Live;
  eg(gid,"H3").value = homeQ4Live;

  // F column: live Q4 score (same as H) until the clock hits <=5:00 remaining,
  // at which point it freezes and stops updating for the rest of the game.
  if(period === 4 && state === "in"){
    const remaining = parseClockRemaining(status.clock);
    if(remaining !== null && remaining <= 5 && st.q4Snapshot.away === null){
      st.q4Snapshot.away = awayQ4Live;
      st.q4Snapshot.home = homeQ4Live;
    } else if(remaining !== null && remaining < 5 && st.q4Snapshot.away === null && !st.backfillAttempted){
      // We loaded the page after the 5:00 mark already passed — reconstruct
      // the score as it stood at that moment from play-by-play instead of
      // guessing with the current (later, higher) score.
      st.backfillAttempted = true;
      backfillQ4Snapshot(gid, away, home);
    }
  }
  if(period > 4 || state === "post"){
    if(st.q4Snapshot.away === null && !st.backfillAttempted){
      st.backfillAttempted = true;
      backfillQ4Snapshot(gid, away, home);
    }
  }

  if(st.q4Snapshot.away !== null){
    eg(gid,"F2").value = st.q4Snapshot.away;
    eg(gid,"F3").value = st.q4Snapshot.home;
  } else {
    // Not frozen yet — mirror the live score just like H, so F reads live
    // during the run-up to the 5-minute mark instead of sitting at 0.
    eg(gid,"F2").value = awayQ4Live;
    eg(gid,"F3").value = homeQ4Live;
  }

  // Overtime columns (Q5, Q6, ...) — only show real values for a given game
  // once it actually reaches that OT period; otherwise show a dash, since
  // most games never need these columns at all.
  let otSumAway = 0, otSumHome = 0;
  for(let n=1; n<=extraOTCount; n++){
    const periodNum = 4 + n;
    const reached = period >= periodNum;
    if(reached){
      const aVal = periodScore(away, periodNum) ?? 0;
      const hVal = periodScore(home, periodNum) ?? 0;
      eg(gid, `OT${n}_2`).textContent = fmt(aVal);
      eg(gid, `OT${n}_3`).textContent = fmt(hVal);
      eg(gid, `OT${n}_4`).textContent = fmt(aVal + hVal);
      otSumAway += aVal;
      otSumHome += hVal;
    } else {
      eg(gid, `OT${n}_2`).textContent = "–";
      eg(gid, `OT${n}_3`).textContent = "–";
      eg(gid, `OT${n}_4`).textContent = "–";
    }
  }
  st.otSumAway = otSumAway;
  st.otSumHome = otSumHome;

  // matchup/status label
  let statusText;
  if(state === "pre"){
    statusText = status.detail || "Scheduled";
  } else if(state === "in"){
    statusText = `Q${period} · ${status.clock || ""} remaining`;
  } else {
    statusText = "Final";
  }
  eg(gid,"matchup").textContent = `${away.name} @ ${home.name} — ${statusText}`;

  recalcGame(gid);
}

const SCOREBOARD_URL = "https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard";

const PROXIES = [
  url => "https://corsproxy.io/?url=" + encodeURIComponent(url),
  url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  url => "https://thingproxy.freeboard.io/fetch/" + url,
  url => url
];

function ymd(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}${m}${day}`;
}

// Plain default endpoint (ESPN's "today") is primary since we want tonight's
// games specifically; the narrow ±1 day window is only a timezone-mismatch fallback.
// A cache-busting timestamp is appended so proxies (many of which cache by
// exact URL) and the browser can't serve back a stale response.
function targetUrls(){
  const today = new Date();
  const start = new Date(today); start.setDate(start.getDate() - 1);
  const end = new Date(today); end.setDate(end.getDate() + 1);
  const bust = `_=${Date.now()}`;
  return [
    `${SCOREBOARD_URL}?${bust}`,
    `${SCOREBOARD_URL}?dates=${ymd(start)}-${ymd(end)}&${bust}`
  ];
}

function scoreboardUrls(){
  const attempts = [];
  for(const target of targetUrls()){
    for(const wrap of PROXIES){
      attempts.push(wrap(target));
    }
  }
  return attempts;
}

// Reconstructs the Q4 score exactly as it stood when the clock hit 5:00
// remaining, using ESPN's per-game scoringPlays feed. Needed when the page
// loads (or first sees this game) after that moment has already passed —
// the scoreboard endpoint only ever gives the CURRENT score, not history.
async function backfillQ4Snapshot(gid, away, home){
  const st = gameState[gid];
  if(!st) return;
  const eventId = gid.slice(1); // strip leading "g"
  const summaryTarget = `https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/summary?event=${eventId}`;
  const awayQ13 = away.q1 + away.q2 + away.q3;
  const homeQ13 = home.q1 + home.q2 + home.q3;

  for(const wrap of PROXIES){
    try{
      const bust = `_=${Date.now()}`;
      const sep = summaryTarget.includes("?") ? "&" : "?";
      const url = wrap(summaryTarget + sep + bust);
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok) continue;
      const data = await res.json();
      const scoringPlays = data.scoringPlays || [];

      // Find the last scoring play at/before the 5:00 mark of Q4.
      let candidate = null;
      for(const p of scoringPlays){
        const per = p.period && p.period.number;
        if(per !== 4) continue;
        const remaining = parseClockRemaining(p.clock && p.clock.displayValue);
        if(remaining === null) continue;
        if(remaining >= 5) candidate = p;
      }

      if(candidate && typeof candidate.awayScore === "number" && typeof candidate.homeScore === "number"){
        st.q4Snapshot.away = candidate.awayScore - awayQ13;
        st.q4Snapshot.home = candidate.homeScore - homeQ13;
      } else {
        // No scoring happened at/before 5:00 in Q4 (rare) — treat as 0-0 at that mark.
        st.q4Snapshot.away = 0;
        st.q4Snapshot.home = 0;
      }
      recalcGame(gid);
      return;
    } catch(e){
      // try next proxy
    }
  }
  // All proxies failed — leave snapshot unset; it'll retry on the next poll
  // since backfillAttempted only blocks re-triggering within this attempt cycle.
  st.backfillAttempted = false;
}

function shortUrl(url){
  if(url.includes("corsproxy.io")) return "corsproxy.io";
  if(url.includes("allorigins")) return "allorigins.win";
  if(url.includes("thingproxy")) return "thingproxy";
  return "direct";
}

function quarterPoints(linescores, period){
  if(!Array.isArray(linescores)) return 0;
  const entry = linescores.find(l => l.period === period);
  return entry ? num(entry.value) : 0;
}

function parseEvent(ev){
  const comp = ev.competitions[0];
  const competitors = comp.competitors || [];
  const awayC = competitors.find(c => c.homeAway === "away");
  const homeC = competitors.find(c => c.homeAway === "home");

  const toTeam = c => ({
    name: (c.team && c.team.displayName) || "Team",
    q1: quarterPoints(c.linescores, 1),
    q2: quarterPoints(c.linescores, 2),
    q3: quarterPoints(c.linescores, 3),
    q4: quarterPoints(c.linescores, 4),
    linescores: c.linescores || []
  });

  const statusBlock = comp.status || ev.status || {};
  const type = statusBlock.type || {};
  const state = type.state || "pre";
  const period = statusBlock.period || 0;
  const clock = state === "in" ? (statusBlock.displayClock || null) : null;
  const detail = type.detail || type.shortDetail || null;

  return {
    id: ev.id,
    date: ev.date,
    away: toTeam(awayC),
    home: toTeam(homeC),
    status: { period, clock, state, detail }
  };
}

async function fetchScores(){
  try{
    let events = null;
    let lastErr = null;
    const attemptLog = [];
    for(const url of scoreboardUrls()){
      try{
        const res = await fetch(url, { cache: "no-store" });
        if(!res.ok){
          attemptLog.push(`${shortUrl(url)} → HTTP ${res.status}`);
          throw new Error("API error " + res.status);
        }
        const data = await res.json();
        events = data.events || [];
        attemptLog.push(`${shortUrl(url)} → OK, ${events.length} events`);
        break;
      } catch(e){
        attemptLog.push(`${shortUrl(url)} → FAILED: ${e.message || e}`);
        lastErr = e;
      }
    }
    $("debugLog").textContent = attemptLog.join("  |  ");

    if(events === null) throw (lastErr || new Error("no successful fetch"));

    const parsedList = events.map(parseEvent).sort((a,b)=> new Date(a.date) - new Date(b.date));

    if(parsedList.length === 0){
      setGlobalStatus("No games found", false);
      showBanner("No WNBA games found for today's date window yet. Retrying automatically — you can also enter scores manually below.");
      failCount++;
      if(failCount >= 2 && Object.keys(gameState).length === 0) enableManualFallbackBlock();
      return;
    }

    showBanner(null);
    liveMode = true;
    failCount = 0;

    const liveCount = parsedList.filter(g => g.status.state === "in").length;
    const allFinal = parsedList.every(g => g.status.state === "post");

    const needed = neededOTCount(parsedList);
    if(needed > extraOTCount){
      rebuildForOT(needed);
    }

    for(const g of parsedList){
      applyGameData("g" + g.id, g.away, g.home, g.status);
    }

    $("lastUpdated").textContent = new Date().toLocaleTimeString();

    if(allFinal){
      stopAutoRefresh();
      setGlobalStatus(`${parsedList.length} game${parsedList.length>1?"s":""} — all final`, false);
      $("clockInfo").textContent = "All games final — auto-refresh stopped";
    } else {
      setGlobalStatus(`${parsedList.length} game${parsedList.length>1?"s":""} found — ${liveCount} live`, liveCount > 0);
      $("clockInfo").textContent = "Auto-refreshing every 5s";
      startAutoRefresh();
    }

  } catch(err){
    failCount++;
    console.error("Score fetch failed:", err);
    if(!liveMode && Object.keys(gameState).length === 0){
      setGlobalStatus("Live fetch unavailable", false);
      showBanner("Live score lookup failed. See attempt log below for details. You can enter scores manually below.");
      if(failCount >= 2) enableManualFallbackBlock();
    } else {
      showBanner("Refresh failed — showing last known data. Will retry automatically.");
    }
  }
}

let refreshTimer = null;
function startAutoRefresh(){
  if(refreshTimer) return; // already running
  refreshTimer = setInterval(fetchScores, 5000);
}
function stopAutoRefresh(){
  if(refreshTimer){
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

// --- Live over/under totals (The Odds API) ---
// One request covers every WNBA game at once, so this runs on its own,
// much slower interval than the 5s score poll — the free tier's monthly
// quota is small, and a total line doesn't need second-by-second updates.
const ODDS_API_KEY = "fc97d44282a5e9a7ab182a109b2559c7";
const ODDS_API_URL = `https://api.the-odds-api.com/v4/sports/basketball_wnba/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=totals`;

function normalizeTeamName(name){
  return (name || "").toLowerCase().trim();
}

function extractTotalPoint(game){
  for(const bk of (game.bookmakers || [])){
    const totals = (bk.markets || []).find(m => m.key === "totals");
    if(totals && Array.isArray(totals.outcomes)){
      const withPoint = totals.outcomes.find(o => typeof o.point === "number");
      if(withPoint) return withPoint.point;
    }
  }
  return null;
}

function applyOddsData(games){
  for(const g of games){
    const point = extractTotalPoint(g);
    if(point === null) continue;
    const away = normalizeTeamName(g.away_team);
    const home = normalizeTeamName(g.home_team);

    for(const gid of Object.keys(gameState)){
      const awayEl = document.getElementById(`${gid}-awayName`);
      const homeEl = document.getElementById(`${gid}-homeName`);
      const k4El = document.getElementById(`${gid}-K4`);
      if(!awayEl || !homeEl || !k4El) continue;
      if(normalizeTeamName(awayEl.textContent) === away && normalizeTeamName(homeEl.textContent) === home){
        k4El.textContent = fmt(point, 1);
      }
    }
  }
}

async function fetchOdds(){
  const attempts = [ODDS_API_URL, PROXIES[0](ODDS_API_URL), PROXIES[1](ODDS_API_URL)];
  for(const url of attempts){
    try{
      const res = await fetch(url, { cache: "no-store" });
      if(res.status === 401){ console.error("Odds API: invalid key"); return; }
      if(res.status === 429){ console.error("Odds API: rate limit / quota exceeded"); return; }
      if(!res.ok) continue;
      const data = await res.json();
      applyOddsData(data);
      return;
    } catch(e){
      // try next
    }
  }
}

$("refreshBtn").addEventListener("click", fetchScores);

fetchScores();
startAutoRefresh();

fetchOdds();
setInterval(fetchOdds, 60000);
</script>
